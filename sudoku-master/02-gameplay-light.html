<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Play - The Manuscript</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #FBF9F1;
            color: #1A1B41;
        }
        .font-serif {
            font-family: 'Newsreader', serif;
        }
        .sudoku-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            aspect-ratio: 1 / 1;
            border: 2px solid #1A1B41;
            background-color: #1A1B41;
            gap: 1px;
        }
        .sudoku-cell {
            background-color: #FFF;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .sudoku-cell:nth-child(3n) { border-right: 2px solid #1A1B41; }
        .sudoku-cell:nth-child(9n) { border-right: none; }
        .sudoku-grid > div:nth-child(n+19):nth-child(-n+27),
        .sudoku-grid > div:nth-child(n+46):nth-child(-n+54) {
            border-bottom: 2px solid #1A1B41;
        }
        .sudoku-cell.selected {
            background-color: #FFE088;
        }
        .sudoku-cell.highlight {
            background-color: #F6F4EC;
        }
        .sudoku-cell.fixed {
            color: #1A1B41;
            font-weight: 700;
        }
        .sudoku-cell.input {
            color: #735C00;
        }
    </style>
</head>

    <!-- Top App Bar -->
    <header class="flex justify-between items-center px-6 py-6 w-full sticky top-0 bg-[#FBF9F1] z-50">
        <div class="flex items-center gap-3">
            <span class="material-icons-outlined text-[#1A1B41]">menu_book</span>
            <h1 class="font-serif italic text-2xl tracking-tight">The Modern Archivist</h1>
        </div>
        <button class="material-icons-outlined text-[#1A1B41] opacity-70">notifications</button>
    </header>

    <main class="flex-1 px-6">
        <!-- Header Info -->
        <div class="mb-8">

            <div class="flex justify-between items-end">

                <div class="text-right">
                    <div class="flex items-center justify-end gap-1 text-[#1A1B41]">
                        <span class="material-icons-outlined text-sm">schedule</span>
                        <span class="font-medium tracking-tight text-lg">14:22</span>
                    </div>
                    <p class="text-[10px] font-bold tracking-widest uppercase opacity-40">Difficultas: Ardua</p>
                </div>
            </div>
        </div>

        <!-- Sudoku Grid -->

        <!-- Controls -->
        <div class="flex justify-between items-center mb-10">
            <button class="flex flex-col items-center gap-2 group">
                <div class="w-12 h-12 rounded-full bg-[#E3E3DC] flex items-center justify-center group-active:scale-95 transition-transform">
                    <span class="material-icons-outlined text-[#1A1B41]">undo</span>
                </div>
                <span class="text-[10px] font-bold tracking-widest uppercase opacity-60">Undo</span>
            </button>
            <button class="flex flex-col items-center gap-2 group">

                </div>
                <span class="text-[10px] font-bold tracking-widest uppercase opacity-60">Erase</span>
            </button>
            <button class="flex flex-col items-center gap-2 group">
                <div class="w-12 h-12 rounded-full bg-[#1A1B41] flex items-center justify-center group-active:scale-95 transition-transform relative">
                    <span class="material-icons-outlined text-white">notes</span>
                    <div class="absolute top-0 right-0 w-2 h-2 bg-[#735C00] rounded-full border-2 border-[#FBF9F1]"></div>
                </div>
                <span class="text-[10px] font-bold tracking-widest uppercase text-[#735C00]">Notes: On</span>
            </button>
            <button class="flex flex-col items-center gap-2 group">
                <div class="w-12 h-12 rounded-full bg-[#E3E3DC] flex items-center justify-center group-active:scale-95 transition-transform">

                </div>
                <span class="text-[10px] font-bold tracking-widest uppercase opacity-60">Hint</span>
            </button>
        </div>

        <!-- Number Pad -->
        <div class="flex justify-between items-center gap-2">
            <button class="w-10 h-12 rounded-lg bg-[#E3E3DC] flex items-center justify-center font-serif text-xl active:bg-[#FFE088] transition-colors">1</button>
            <button class="w-10 h-12 rounded-lg bg-[#FFE088] flex items-center justify-center font-serif text-xl border border-[#735C00]/20">2</button>
            <button class="w-10 h-12 rounded-lg bg-[#E3E3DC] flex items-center justify-center font-serif text-xl active:bg-[#FFE088] transition-colors">3</button>
            <button class="w-10 h-12 rounded-lg bg-[#E3E3DC] flex items-center justify-center font-serif text-xl active:bg-[#FFE088] transition-colors">4</button>
            <button class="w-10 h-12 rounded-lg bg-[#E3E3DC] flex items-center justify-center font-serif text-xl active:bg-[#FFE088] transition-colors">5</button>
            <button class="w-10 h-12 rounded-lg bg-[#E3E3DC] flex items-center justify-center font-serif text-xl active:bg-[#FFE088] transition-colors">6</button>
            <button class="w-10 h-12 rounded-lg bg-[#E3E3DC] flex items-center justify-center font-serif text-xl active:bg-[#FFE088] transition-colors">7</button>

        </div>
    </main>

    <!-- Navigation Bar -->
    <nav class="fixed bottom-0 left-0 w-full bg-[#FBF9F1] border-t border-[#1A1B41]/5 px-4 pb-8 pt-4 flex justify-around items-center z-50">
        <button class="flex flex-col items-center gap-1 text-slate-400">

        <button class="flex flex-col items-center gap-1 text-slate-400">
            <span class="material-icons-outlined">inventory_2</span>

        <button class="flex flex-col items-center gap-1 text-[#735C00]">
            <div class="bg-[#FFE088] rounded-xl px-4 py-1 mb-1">
                <span class="material-icons-outlined">calendar_today</span>
            </div>
            <span class="text-[10px] font-bold tracking-widest uppercase">Daily</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-slate-400">
            <span class="material-icons-outlined">person</span>

</body>
</html>
