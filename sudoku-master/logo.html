<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo - The Modern Archivist</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            padding: 40px 20px;
        }
        .variant {
            text-align: center;
        }
        .variant h3 {
            font-family: Georgia, serif;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        img, object {
            max-width: 280px;
            height: auto;
        }
        .dark-bg {
            background: #1E1B16;
            color: #E8E0D0;
        }
        .light-bg {
            background: #F5F0E1;
            color: #2C2318;
        }
        .split {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }
        .split > div {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
    </style>
</head>
<body class="dark-bg">
    <div class="variant">
        <h3>Dark Background</h3>
        <img src="logo.svg" alt="The Modern Archivist Logo">
    </div>

    <div style="width:200px; height:1px; background:#C6973F; opacity:0.2;"></div>

    <div class="variant" style="background:#F5F0E1; padding:40px; border-radius:16px;">
        <h3 style="color:#2C2318;">Light Background</h3>
        <img src="logo.svg" alt="The Modern Archivist Logo">
    </div>

    <div style="width:200px; height:1px; background:#C6973F; opacity:0.2;"></div>

    <div class="variant">
        <h3>Small (App Icon Size)</h3>
        <div style="display:flex; gap:20px; align-items:center; justify-content:center;">
            <img src="logo.svg" alt="Logo" style="max-width:64px;">
            <img src="logo.svg" alt="Logo" style="max-width:128px;">
        </div>
    </div>
</body>
</html>
