<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victory Celebration - Masterfully Solved!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Manrope:wght@200..800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Newsreader', 'serif'],
                        sans: ['Manrope', 'sans-serif'],
                    },
                    colors: {
                        primary: '#000666',
                        accent: '#E6C487',
                        surface: '#FBF9F1',
                        'on-surface': '#020229',
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .bg-mesh {
            background-color: #FBF9F1;
            background-image: radial-gradient(at 0% 0%, rgba(230, 196, 135, 0.1) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(0, 6, 102, 0.05) 0px, transparent 50%);
        }
    </style>
</head>
<body class="bg-mesh font-sans text-on-surface min-h-screen flex flex-col">
    <header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-surface/80 backdrop-blur-md">
        <div class="flex items-center gap-2 bg-primary/10 p-2 rounded-xl">
            <span class="material-symbols-outlined text-primary">school</span>
        </div>
        <h1 class="font-serif italic text-2xl text-primary">The Archivist</h1>
        <button class="p-2 text-on-surface/60"><span class="material-symbols-outlined">settings</span></button>
    </header>
    <main class="flex-grow pt-24 pb-32 px-6 flex flex-col items-center">
        <div class="w-full bg-white rounded-3xl p-8 shadow-[0_20px_50px_rgba(0,6,102,0.05)] border border-primary/5 flex flex-col items-center text-center">
            <div class="relative mb-6">
                <div class="w-24 h-24 bg-accent rounded-2xl flex items-center justify-center shadow-lg shadow-accent/30 transform -rotate-3">
                    <span class="material-symbols-outlined text-white text-5xl" style="font-variation-settings: 'FILL' 1;">stars</span>
                </div>
            </div>
            <p class="font-sans font-bold text-xs uppercase tracking-widest text-[#735c00] mb-2">Expert Difficulty</p>
            <h2 class="font-serif italic text-5xl text-primary leading-tight mb-8">Masterfully Solved!</h2>
            <div class="w-full grid grid-cols-2 gap-px bg-on-surface/10 py-2">
                <div class="flex flex-col items-center bg-white py-4">
                    <p class="font-sans text-[10px] uppercase tracking-widest text-on-surface/50 mb-1">Time</p>
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary text-sm">schedule</span>
                        <span class="font-serif text-3xl text-primary">14:22</span>
                    </div>
                </div>
                <div class="flex flex-col items-center bg-white py-4">
                    <p class="font-sans text-[10px] uppercase tracking-widest text-on-surface/50 mb-1">Current Streak</p>
                    <div class="flex flex-col items-center">
                        <span class="font-serif text-5xl text-[#735c00]">13</span>
                        <div class="flex items-center gap-1">
                            <span class="material-symbols-outlined text-[#735c00] text-sm" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
                            <span class="font-serif text-xl text-[#735c00]">Days</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="mt-12 text-center px-4">
            <div class="w-12 h-px bg-on-surface/10 mx-auto mb-6"></div>
            <p class="font-serif italic text-lg text-on-surface/70 leading-relaxed">"Logic is the beginning of wisdom, not the end."</p>
            <div class="w-12 h-px bg-on-surface/10 mx-auto mt-6"></div>
        </div>
        <div class="w-full mt-auto space-y-4 pt-12">
            <button class="w-full bg-primary text-white font-sans font-bold uppercase tracking-widest text-sm py-5 rounded-2xl shadow-lg shadow-primary/20 active:scale-95 transition-transform">New Expert Challenge</button>
            <button class="w-full flex items-center justify-center gap-2 py-4 font-sans font-bold uppercase tracking-widest text-[11px] text-primary active:scale-95 transition-transform">
                <span class="material-symbols-outlined text-sm">arrow_back</span> Return to Library
            </button>
        </div>
    </main>
    <nav class="fixed bottom-0 left-0 w-full bg-surface/90 backdrop-blur-xl border-t border-on-surface/5 flex justify-around items-center px-4 pb-8 pt-3 z-50">
        <button class="flex flex-col items-center gap-1 text-on-surface/40"><span class="material-symbols-outlined">menu_book</span><span class="font-sans text-[10px] font-bold uppercase tracking-widest">Study</span></button>
        <button class="flex flex-col items-center gap-1 text-[#735c00]"><div class="w-10 h-10 bg-accent/20 rounded-xl flex items-center justify-center mb-1"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">inventory_2</span></div><span class="font-sans text-[10px] font-bold uppercase tracking-widest">Archive</span></button>
        <button class="flex flex-col items-center gap-1 text-on-surface/40"><span class="material-symbols-outlined">event_upcoming</span><span class="font-sans text-[10px] font-bold uppercase tracking-widest">Daily</span></button>
        <button class="flex flex-col items-center gap-1 text-on-surface/40"><span class="material-symbols-outlined">person</span><span class="font-sans text-[10px] font-bold uppercase tracking-widest">Profile</span></button>
    </nav>
</body>
</html>
