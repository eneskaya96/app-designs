<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PuzzleSnap — Level Complete</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Nunito Sans', sans-serif;
    background: rgba(61,44,46,0.85);
    color: #3D2C2E;
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal {
    background: #fff;
    border-radius: 28px;
    width: 100%;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.3);
    animation: slideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .confetti-area {
    position: relative;
    height: 60px;
    overflow: hidden;
    background: linear-gradient(135deg, #FFF8F0, #FFF3E6);
  }
  .confetti {
    position: absolute;
    font-size: 18px;
    animation: confettiFall 2s ease-in infinite;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(80px) rotate(360deg); opacity: 0; }
  }
  .confetti:nth-child(1) { left: 10%; animation-delay: 0s; color: #F4A261; }
  .confetti:nth-child(2) { left: 25%; animation-delay: 0.3s; color: #2A9D8F; }
  .confetti:nth-child(3) { left: 40%; animation-delay: 0.1s; color: #E76F51; }
  .confetti:nth-child(4) { left: 55%; animation-delay: 0.5s; color: #F4A261; }
  .confetti:nth-child(5) { left: 70%; animation-delay: 0.2s; color: #2A9D8F; }
  .confetti:nth-child(6) { left: 85%; animation-delay: 0.4s; color: #E76F51; }

  .modal-content {
    padding: 0 24px 28px;
    text-align: center;
  }

  .title {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 4px;
    color: #3D2C2E;
  }
  .subtitle {
    font-size: 14px;
    color: #9B8A8C;
    font-weight: 600;
    margin-bottom: 20px;
  }

  .stars {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 24px;
  }
  .star {
    font-size: 48px;
    animation: starPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .star:nth-child(1) { animation-delay: 0.2s; }
  .star:nth-child(2) { animation-delay: 0.5s; }
  .star:nth-child(3) { animation-delay: 0.8s; }
  @keyframes starPop {
    0% { transform: scale(0) rotate(-30deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .star.earned { color: #F4A261; text-shadow: 0 4px 20px rgba(244,162,97,0.4); }
  .star.empty { color: #E0D5C7; }

  .revealed-image {
    width: 100%;
    height: 180px;
    background: linear-gradient(135deg, #E8D5B7 0%, #F5E6D0 30%, #D4E7D0 60%, #C8DEC4 100%);
    border-radius: 16px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 40px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    position: relative;
    overflow: hidden;
  }
  .revealed-image::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 60%, rgba(255,255,255,0.3));
    border-radius: 16px;
  }
  .image-badge {
    position: absolute;
    top: 12px; right: 12px;
    background: rgba(42,157,143,0.9);
    color: #fff;
    font-size: 11px;
    font-weight: 800;
    padding: 4px 12px;
    border-radius: 10px;
    z-index: 1;
  }

  .stats-row {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 20px;
  }
  .stat {
    text-align: center;
  }
  .stat-value {
    font-size: 22px;
    font-weight: 800;
    color: #3D2C2E;
  }
  .stat-label {
    font-size: 12px;
    color: #9B8A8C;
    font-weight: 600;
  }

  .reward {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #FFF8E1, #FFF3CD);
    padding: 10px 24px;
    border-radius: 16px;
    margin-bottom: 20px;
    font-size: 16px;
    font-weight: 800;
    color: #F4A261;
    box-shadow: 0 2px 12px rgba(244,162,97,0.15);
  }

  .buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .btn-primary {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #F4A261, #E8924A);
    border: none;
    border-radius: 16px;
    color: #fff;
    font-family: 'Nunito Sans', sans-serif;
    font-size: 17px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(244,162,97,0.35);
    transition: transform 0.2s;
  }
  .btn-primary:hover { transform: translateY(-2px); }

  .btn-secondary {
    width: 100%;
    padding: 14px;
    background: rgba(42,157,143,0.1);
    border: none;
    border-radius: 16px;
    color: #2A9D8F;
    font-family: 'Nunito Sans', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-secondary:hover { background: rgba(42,157,143,0.15); }

  .ad-link {
    margin-top: 12px;
    font-size: 13px;
    color: #9B8A8C;
    font-weight: 600;
    cursor: pointer;
  }
  .ad-link span { color: #F4A261; font-weight: 700; }
</style>
</head>
<body>

<div class="modal">
  <div class="confetti-area">
    <span class="confetti">&#10022;</span>
    <span class="confetti">&#10022;</span>
    <span class="confetti">&#10022;</span>
    <span class="confetti">&#10022;</span>
    <span class="confetti">&#10022;</span>
    <span class="confetti">&#10022;</span>
  </div>

  <div class="modal-content">
    <div class="title">Puzzle Complete!</div>
    <div class="subtitle">Spring Garden — Level 12</div>

    <div class="stars">
      <span class="star earned">&#9733;</span>
      <span class="star earned">&#9733;</span>
      <span class="star earned">&#9733;</span>
    </div>

    <div class="revealed-image">
      <span class="image-badge">&#10003; Added to Gallery</span>
      &#127800; &#127801; &#127799; &#127804; &#127803;
    </div>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-value">18</div>
        <div class="stat-label">Moves</div>
      </div>
      <div class="stat">
        <div class="stat-value">2:34</div>
        <div class="stat-label">Time</div>
      </div>
      <div class="stat">
        <div class="stat-value">92%</div>
        <div class="stat-label">Solved by</div>
      </div>
    </div>

    <div class="reward">&#9679; +25 Coins Earned</div>

    <div class="buttons">
      <button class="btn-primary">Next Level &rarr;</button>
      <button class="btn-secondary">&#128444; Add to Gallery</button>
    </div>

    <div class="ad-link">Watch ad for <span>+15 bonus coins</span></div>
  </div>
</div>

</body>
</html>
