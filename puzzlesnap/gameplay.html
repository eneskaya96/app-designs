<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PuzzleSnap — Gameplay</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Nunito Sans', sans-serif;
    background: #FFF8F0;
    color: #3D2C2E;
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
    overflow-x: hidden;
  }

  .top-hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px;
  }
  .back-btn {
    width: 40px; height: 40px;
    background: #fff;
    border: none; border-radius: 50%;
    font-size: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .level-info {
    text-align: center;
  }
  .level-world {
    font-size: 11px;
    color: #2A9D8F;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .level-number {
    font-size: 18px;
    font-weight: 800;
  }
  .hearts {
    display: flex; gap: 4px;
  }
  .heart { font-size: 22px; }
  .heart.full { color: #E76F51; }
  .heart.empty { color: #E0D5C7; }

  .moves-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    padding: 8px 20px 16px;
  }
  .stat {
    display: flex; align-items: center; gap: 6px;
    font-size: 14px; font-weight: 700;
    color: #9B8A8C;
  }
  .stat-value { color: #3D2C2E; }

  .puzzle-area {
    padding: 0 20px;
    margin-bottom: 20px;
  }
  .puzzle-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    aspect-ratio: 1;
  }
  .card {
    border-radius: 12px;
    aspect-ratio: 0.75;
    position: relative;
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s;
    overflow: hidden;
  }
  .card:hover { transform: scale(1.03); }
  .card.face-up {
    background: #fff;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }
  .card.face-down {
    background: linear-gradient(135deg, #F4A261, #E8924A);
    box-shadow: 0 4px 16px rgba(244,162,97,0.2);
  }
  .card.snapped {
    box-shadow: 0 0 0 3px #2A9D8F, 0 4px 16px rgba(42,157,143,0.2);
  }
  .card.dragging {
    transform: scale(1.08) rotate(-2deg);
    box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    z-index: 10;
  }

  .card-image {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
  }
  .card-back {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .card-back::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 2px dashed rgba(255,255,255,0.3);
    border-radius: 8px;
  }
  .card-back-icon {
    font-size: 24px;
    color: rgba(255,255,255,0.6);
  }

  .snap-indicator {
    position: absolute;
    top: 6px; right: 6px;
    width: 18px; height: 18px;
    background: #2A9D8F;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    color: #fff;
  }

  .reference-image {
    margin: 0 20px 20px;
    background: #fff;
    border-radius: 16px;
    padding: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.05);
  }
  .ref-label {
    font-size: 11px;
    font-weight: 700;
    color: #9B8A8C;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .ref-preview {
    width: 100%;
    height: 60px;
    background: linear-gradient(135deg, #E8D5B7 0%, #F5E6D0 30%, #D4E7D0 60%, #C8DEC4 100%);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 20px;
  }

  .action-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: #fff;
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 12px 20px 32px;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
    border-radius: 20px 20px 0 0;
  }
  .action-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    border: none;
    background: none;
    cursor: pointer;
    font-family: 'Nunito Sans', sans-serif;
    position: relative;
  }
  .action-icon {
    width: 48px; height: 48px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    transition: transform 0.2s;
  }
  .action-icon:hover { transform: scale(1.1); }
  .action-icon.hint { background: rgba(42,157,143,0.1); color: #2A9D8F; }
  .action-icon.undo { background: rgba(244,162,97,0.1); color: #F4A261; }
  .action-icon.shuffle { background: rgba(231,111,81,0.1); color: #E76F51; }
  .action-label {
    font-size: 11px;
    font-weight: 700;
    color: #9B8A8C;
  }
  .action-badge {
    position: absolute;
    top: -4px; right: -4px;
    background: #3D2C2E;
    color: #fff;
    font-size: 10px;
    font-weight: 800;
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
</style>
</head>
<body>

<div class="top-hud">
  <button class="back-btn">&larr;</button>
  <div class="level-info">
    <div class="level-world">Spring Garden</div>
    <div class="level-number">Level 12</div>
  </div>
  <div class="hearts">
    <span class="heart full">&#9829;</span>
    <span class="heart full">&#9829;</span>
    <span class="heart full">&#9829;</span>
  </div>
</div>

<div class="moves-bar">
  <div class="stat">Moves: <span class="stat-value">0</span></div>
  <div class="stat">Pairs: <span class="stat-value">0 / 8</span></div>
</div>

<div class="puzzle-area">
  <div class="puzzle-grid">
    <!-- Row 1 -->
    <div class="card face-up snapped">
      <div class="card-image">&#127800;</div>
      <div class="snap-indicator">&#10003;</div>
    </div>
    <div class="card face-up snapped">
      <div class="card-image">&#127801;</div>
      <div class="snap-indicator">&#10003;</div>
    </div>
    <div class="card face-down">
      <div class="card-back"><span class="card-back-icon">&#129513;</span></div>
    </div>
    <div class="card face-up">
      <div class="card-image">&#127799;</div>
    </div>

    <!-- Row 2 -->
    <div class="card face-down">
      <div class="card-back"><span class="card-back-icon">&#129513;</span></div>
    </div>
    <div class="card face-up dragging">
      <div class="card-image">&#127804;</div>
    </div>
    <div class="card face-up">
      <div class="card-image">&#127803;</div>
    </div>
    <div class="card face-down">
      <div class="card-back"><span class="card-back-icon">&#129513;</span></div>
    </div>

    <!-- Row 3 -->
    <div class="card face-up">
      <div class="card-image">&#127802;</div>
    </div>
    <div class="card face-down">
      <div class="card-back"><span class="card-back-icon">&#129513;</span></div>
    </div>
    <div class="card face-up snapped">
      <div class="card-image">&#127807;</div>
      <div class="snap-indicator">&#10003;</div>
    </div>
    <div class="card face-up">
      <div class="card-image">&#127793;</div>
    </div>

    <!-- Row 4 -->
    <div class="card face-down">
      <div class="card-back"><span class="card-back-icon">&#129513;</span></div>
    </div>
    <div class="card face-up">
      <div class="card-image">&#127797;</div>
    </div>
    <div class="card face-down">
      <div class="card-back"><span class="card-back-icon">&#129513;</span></div>
    </div>
    <div class="card face-up snapped">
      <div class="card-image">&#127795;</div>
      <div class="snap-indicator">&#10003;</div>
    </div>
  </div>
</div>

<div class="reference-image">
  <div class="ref-label">Target Image</div>
  <div class="ref-preview">
    &#127800; &#127801; &#127799; &#127804; &#127803; &#127802; &#127807; &#127793;
  </div>
</div>

<div class="action-bar">
  <button class="action-btn">
    <div class="action-icon hint">&#128161;</div>
    <span class="action-label">Hint</span>
    <span class="action-badge">2</span>
  </button>
  <button class="action-btn">
    <div class="action-icon undo">&#8634;</div>
    <span class="action-label">Undo</span>
    <span class="action-badge">3</span>
  </button>
  <button class="action-btn">
    <div class="action-icon shuffle">&#128256;</div>
    <span class="action-label">Shuffle</span>
  </button>
</div>

</body>
</html>
